name: Run Supabase Migration & Backfill

on:
  workflow_dispatch: {}

jobs:
  apply-migration:
    runs-on: ubuntu-latest
    env:
      # Required secrets (set these in repo Settings → Secrets → Actions)
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Verify connection (masked)
        run: |
          if [ -z "$DATABASE_URL" ]; then echo "DATABASE_URL secret is missing"; exit 1; fi
          echo "DATABASE_URL present"

      - name: Apply SQL migration
        run: |
          set -e
          echo "Applying migration: supabase/migrations/001_create_tracking_tables.sql"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/001_create_tracking_tables.sql

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (web)
        working-directory: web
        run: |
          npm ci

      - name: Run backfill (clients → profiles)
        working-directory: web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node scripts/backfill_clients_to_profiles.js

      - name: Done
        run: echo "Migration and backfill completed"
